repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [
          homeassistant>=2024.0.0,
          paho-mqtt>=1.6.0,
          aiohttp>=3.8.0,
          pytest>=7.0.0,
          pytest-asyncio>=0.21.0,
          pylint>=2.17.0
        ]

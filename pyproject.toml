{
  "name": "rest2mqtt",
  "version": "0.1.0",
  "description": "HomeAssistant integration for REST services -> MQTT",
  "readme": "README.md",
  "license": {"text": "MIT"},
  "authors": [
    {"name": "mafe", "email": "mafe@example.com"}
  ],
  "classifiers": [
    "Programming Language :: Python :: 3"
  ],
  "urls": {
    "Homepage": "https://github.com/example/rest2mqtt"
  },
  "dependencies": {
    "homeassistant": ">=2024.0.0",
    "paho-mqtt": ">=1.6.0",
    "aiohttp": ">=3.8.0"
  },
  "optional-dependencies": {
    "dev": [
      "pytest>=7.0.0",
      "pytest-asyncio>=0.21.0",
      "pylint>=2.17.0",
      "mypy>=1.4.0",
      "ruff>=0.1.0",
      "black>=23.0.0"
    ]
  },
  "scripts": {
    "test": "pytest",
    "lint": "ruff check",
    "format": "black .",
    "type-check": "mypy src"
  },
  "build-system": {
    "requires": ["setuptools>=61.0"],
    "build-backend": "setuptools.build_meta"
  }
}

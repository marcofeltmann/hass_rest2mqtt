{
  "name": "rest2mqtt",
  "version": "0.1.0",
  "description": "HomeAssistant integration for REST services -> MQTT",
  "license": "MIT",
  "authors": [
    "mafe <mafe@example.com>"
  ],
  "dependencies": {
    "homeassistant": ">=2023.4.0",
    "paho-mqtt": ">=1.6.0",
    "aiohttp": ">=3.8.0",
    "requests": ">=2.28.0"
  },
  "group-dependencies": {
    "dev": [
      "pytest>=7.0.0",
      "pytest-asyncio>=0.21.0",
      "pytest-homeassistant-custom-component>=0.2.0",
      "pylint>=2.17.0",
      "mypy>=1.4.0",
      "ruff>=0.1.0",
      "black>=23.0.0"
    ]
  },
  "scripts": {
    "test": "pytest",
    "lint": "ruff check",
    "format": "black .",
    "type-check": "mypy src"
  },
  "build-system": {
    "requires": [
      "poetry-core>=1.0.0"
    ],
    "build-backend": "poetry.core.masonry.api"
  }
}